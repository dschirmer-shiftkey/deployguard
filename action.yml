name: "DeployGuard"
description: "Deployment gate for GitHub PRs — scores code risk, checks production health, and blocks dangerous releases."
author: "Komatik"

branding:
  icon: "shield"
  color: "green"

inputs:
  github-token:
    description: "GitHub token for PR analysis and comments. Defaults to the automatic workflow token."
    required: false
    default: ${{ github.token }}
  risk-threshold:
    description: "Block the PR if the risk score exceeds this value (0-100)."
    required: false
    default: "70"
  warn-threshold:
    description: "Add a warning if the risk score exceeds this value. Defaults to risk-threshold minus 15."
    required: false
    default: ""
  health-check-urls:
    description: "Comma-separated URLs to health-check before scoring (omit for risk-only mode)."
    required: false
    default: ""
  fail-mode:
    description: "What to do when DeployGuard itself errors: 'open' allows the deploy, 'closed' blocks it."
    required: false
    default: "open"
  self-heal:
    description: "Attempt to auto-repair failing tests before blocking (requires DEPLOYGUARD_TEST_FAILURES env)."
    required: false
    default: "false"
  add-risk-labels:
    description: "Add risk-level labels (deployguard:low-risk, etc.) to the PR. Requires pull-requests: write."
    required: false
    default: "true"
  reviewers-on-risk:
    description: "Comma-separated GitHub usernames to request review from when decision is warn or block."
    required: false
    default: ""
  webhook-url:
    description: "URL to POST evaluation results to (Slack, Discord, or custom endpoint). Omit to disable."
    required: false
    default: ""
  webhook-events:
    description: "Which decisions trigger the webhook: comma-separated list of allow, warn, block."
    required: false
    default: "warn,block"
  evaluation-store-url:
    description: "URL to POST evaluations for historical trend analysis. Omit to disable."
    required: false
    default: ""
  api-key:
    description: "API key for remote enrichment via a DeployGuard cloud endpoint. Omit for local-only mode."
    required: false
    default: ""

outputs:
  health-score:
    description: "Infrastructure health score (0-100). 100 when no health checks are configured."
  risk-score:
    description: "Code risk score (0-100). Higher means riskier."
  gate-decision:
    description: "Gate decision: allow, warn, or block."
  report-url:
    description: "URL to the full evaluation report (only set when using a remote API)."
  evaluation-json:
    description: "Full gate evaluation as JSON for downstream workflow steps."

runs:
  using: "node20"
  main: "dist/index.js"
