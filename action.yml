name: "DeployGuard"
description: "Deployment gate for GitHub PRs — scores code risk, checks production health, integrates security signals, and blocks dangerous releases."
author: "Komatik"

branding:
  icon: "shield"
  color: "green"

inputs:
  github-token:
    description: "GitHub token for PR analysis and comments. Defaults to the automatic workflow token."
    required: false
    default: ${{ github.token }}
  risk-threshold:
    description: "Block the PR if the risk score exceeds this value (0-100)."
    required: false
    default: "70"
  warn-threshold:
    description: "Add a warning if the risk score exceeds this value. Defaults to risk-threshold minus 15."
    required: false
    default: ""
  health-check-urls:
    description: "Comma-separated URLs to health-check before scoring (omit for risk-only mode)."
    required: false
    default: ""
  fail-mode:
    description: "What to do when DeployGuard itself errors: 'open' allows the deploy, 'closed' blocks it."
    required: false
    default: "open"
  self-heal:
    description: "Attempt to auto-repair failing tests before blocking (requires DEPLOYGUARD_TEST_FAILURES env)."
    required: false
    default: "false"
  add-risk-labels:
    description: "Add risk-level labels (deployguard:low-risk, etc.) to the PR. Requires pull-requests: write."
    required: false
    default: "true"
  reviewers-on-risk:
    description: "Comma-separated GitHub usernames to request review from when decision is warn or block."
    required: false
    default: ""
  webhook-url:
    description: "URL to POST evaluation results to (Slack, Discord, or custom endpoint). Omit to disable."
    required: false
    default: ""
  webhook-events:
    description: "Which decisions trigger the webhook: comma-separated list of allow, warn, block."
    required: false
    default: "warn,block"
  evaluation-store-url:
    description: "URL to POST evaluations for historical trend analysis. Omit to disable."
    required: false
    default: ""
  evaluation-store-secret:
    description: "Bearer token for authenticating with the evaluation store endpoint."
    required: false
    default: ""
  dora-metrics:
    description: "Compute DORA-5 metrics (deployment frequency, change failure rate, lead time, FDRT, rework rate) alongside the gate evaluation."
    required: false
    default: "false"
  dora-environment:
    description: "Specific deployment environment to use for DORA metrics (e.g. 'production'). Uses Deployments API when set."
    required: false
    default: ""
  environment:
    description: "Target deployment environment. Used for per-environment threshold overrides from .deployguard.yml."
    required: false
    default: ""
  security-gate:
    description: "Enable GitHub Code Scanning alert integration as a risk factor. Set to 'false' to disable."
    required: false
    default: "true"
  canary-webhook-secret:
    description: "HMAC secret for verifying deploy outcome webhooks (Vercel/generic)."
    required: false
    default: ""
  otel-endpoint:
    description: "OTLP HTTP endpoint to export evaluation spans to (e.g. https://otel.example.com:4318/v1/traces). Omit to disable."
    required: false
    default: ""
  otel-headers:
    description: "Auth headers for the OTLP endpoint as key=value pairs, comma-separated."
    required: false
    default: ""
  api-key:
    description: "API key for remote enrichment via a DeployGuard cloud endpoint. Omit for local-only mode."
    required: false
    default: ""

outputs:
  health-score:
    description: "Infrastructure health score (0-100). 100 when no health checks are configured."
  risk-score:
    description: "Code risk score (0-100). Higher means riskier."
  gate-decision:
    description: "Gate decision: allow, warn, or block."
  report-url:
    description: "URL to the full evaluation report (only set when using a remote API)."
  evaluation-json:
    description: "Full gate evaluation as JSON for downstream workflow steps."
  dora-deployment-frequency:
    description: "DORA deployment frequency (e.g. '4.2 per week'). Only set when dora-metrics is true."
  dora-change-failure-rate:
    description: "DORA change failure rate percentage (e.g. '8.3%'). Only set when dora-metrics is true."
  dora-lead-time:
    description: "DORA lead time to change (e.g. '2.1 hours'). Only set when dora-metrics is true."
  dora-fdrt:
    description: "DORA failed deployment recovery time. Only set when dora-metrics is true."
  dora-rework-rate:
    description: "DORA change rework rate percentage. Only set when dora-metrics is true."
  dora-rating:
    description: "Overall DORA-5 rating: Elite, High, Medium, or Low. Only set when dora-metrics is true."
  dora-json:
    description: "Full DORA-5 metrics as JSON. Only set when dora-metrics is true."
  security-alerts-json:
    description: "Code scanning alert summary as JSON. Only set when security-gate is enabled and alerts exist."
  environment:
    description: "The deployment environment used for this evaluation."

runs:
  using: "node20"
  main: "dist/index.js"
