name: Bug Report
description: Report a bug in DeployGuard
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below so we can reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: DeployGuard Version
      description: Which version are you using? (e.g. v3.0.1)
      placeholder: "v3"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of DeployGuard is affected?
      options:
        - GitHub Action
        - GitHub App
        - CLI (npx deployguard init)
        - Risk scoring
        - DORA metrics
        - Security gate
        - Health checks
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Create a workflow with...
        2. Open a PR that...
        3. See error...

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant logs or action output here.
      render: shell

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Your `.deployguard.yml` and workflow YAML (redact secrets).
      render: yaml
