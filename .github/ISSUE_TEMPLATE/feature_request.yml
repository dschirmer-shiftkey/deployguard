name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for DeployGuard? We'd love to hear it.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of DeployGuard would this affect?
      options:
        - GitHub Action
        - GitHub App
        - CLI
        - Risk scoring
        - DORA metrics
        - Security gate
        - Health checks
        - New integration
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Why is this needed?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried other approaches or workarounds?
