name: "Self-Test: Trailhead on own PRs"

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write
  security-events: read

jobs:
  gate:
    name: "Trailhead Self-Test"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build action
        run: npm run build

      - name: Run detector fixture tests
        run: npm run test -- src/__tests__/config.test.ts src/__tests__/evaluate-gate.test.ts src/__tests__/gate.test.ts src/__tests__/mcp.test.ts

      - name: Run Trailhead on this PR
        id: gate
        uses: ./
        with:
          risk-threshold: "85"
          warn-threshold: "50"
          fail-mode: "open"
          dora-metrics: "true"
          security-gate: "true"

      - name: Validate structured outputs
        if: always()
        run: |
          node -e "const e=JSON.parse(process.argv[1]); if(!e.pr || !e.pr.provenance) { throw new Error('Missing pr.provenance in evaluation-json'); } if(!e.trust_profile){ throw new Error('Missing trust_profile in evaluation-json'); }" '${{ steps.gate.outputs.evaluation-json }}'
          node -e "const r=JSON.parse(process.argv[1]); if(!['go','review','hold'].includes(r.band)){ throw new Error('Invalid rollout readiness band'); } if(typeof r.ready!=='boolean'){ throw new Error('rollout ready flag missing'); }" '${{ steps.gate.outputs.rollout-readiness-json }}'

      - name: Print outputs
        if: always()
        run: |
          echo "gate-decision: ${{ steps.gate.outputs.gate-decision }}"
          echo "risk-score:    ${{ steps.gate.outputs.risk-score }}"
          echo "health-score:  ${{ steps.gate.outputs.health-score }}"
          echo "report-url:    ${{ steps.gate.outputs.report-url }}"
          echo "dora-rating:   ${{ steps.gate.outputs.dora-rating }}"
          echo "rollout:       ${{ steps.gate.outputs.rollout-readiness-json }}"
          echo ""
          echo "--- evaluation-json (truncated) ---"
          echo '${{ steps.gate.outputs.evaluation-json }}' | head -c 500
          echo ""
          echo "--- dora-json (truncated) ---"
          echo '${{ steps.gate.outputs.dora-json }}' | head -c 500
