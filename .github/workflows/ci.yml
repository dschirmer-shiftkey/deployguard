name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Prettier
        run: npm run format:check

      - name: ESLint + TypeScript (src/)
        run: npm run lint

      - name: Typecheck cli/
        run: |
          cd cli && npm ci && npx tsc --noEmit

      - name: Typecheck app/
        run: |
          cd app && npm ci && npm run prebuild && npx tsc --noEmit

      - name: Typecheck mcp/
        run: |
          cd mcp && npm ci && npm run prebuild && npx tsc --noEmit

      - name: Tests with coverage
        run: npx vitest run --coverage

      - name: Build (ncc)
        run: npm run build

      - name: Verify dist/ is up to date
        run: |
          git diff --exit-code dist/ || {
            echo "::error::dist/ is out of date — run 'npm run build' and commit the result"
            exit 1
          }
