# DeployGuard auto-rollback workflow
#
# Triggered via workflow_dispatch by DeployGuard's rollback module when a
# canary deployment reports failure. Can also be triggered manually.
#
# Prerequisites:
# - Set DEPLOYGUARD_ROLLBACK_WORKFLOW=deployguard-auto-rollback.yml in your
#   DeployGuard config (or pass as env var to the action).
# - Ensure the GitHub token has `actions: write` and `deployments: write` permissions.
#
# Copy to .github/workflows/

name: DeployGuard auto-rollback

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: "Commit SHA to roll back to"
        required: true
      environment:
        description: "Target environment"
        required: true
        default: "production"
      reason:
        description: "Reason for rollback"
        required: false
        default: "deployguard-auto-rollback"
      triggered_by:
        description: "Who/what triggered this rollback"
        required: false

permissions:
  contents: read
  deployments: write

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout target SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_sha }}

      - name: Log rollback context
        run: |
          echo "=== DeployGuard Rollback ==="
          echo "Target SHA:   ${{ inputs.target_sha }}"
          echo "Environment:  ${{ inputs.environment }}"
          echo "Reason:       ${{ inputs.reason }}"
          echo "Triggered by: ${{ inputs.triggered_by }}"
          echo "=========================="

      # Replace the steps below with your actual deployment commands.
      # For example: deploy to Vercel, Fly.io, AWS, etc.
      - name: Deploy target SHA
        run: |
          echo "Deploying ${{ inputs.target_sha }} to ${{ inputs.environment }}..."
          # Example: npx vercel deploy --prod --token=$VERCEL_TOKEN
          # Example: fly deploy --image ghcr.io/org/app:${{ inputs.target_sha }}
          echo "Deployment complete."

      - name: Create deployment status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: deployments } = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              environment: '${{ inputs.environment }}',
              per_page: 1,
            });

            if (deployments.length > 0) {
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployments[0].id,
                state: '${{ job.status }}' === 'success' ? 'success' : 'failure',
                description: 'DeployGuard rollback: ${{ inputs.reason }}',
              });
            }
