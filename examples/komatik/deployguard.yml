# .deployguard.yml — Komatik-managed repository template
#
# Tuned for repositories monitored by the Komatik autonomous agent workforce.
# Stricter sensitivity patterns, agent-aware ignore rules, and per-environment
# overrides aligned with HQ trust levels.
#
# Copy to .deployguard.yml in your repo root.

sensitivity:
  high:
    - "src/auth/**"
    - "src/security/**"
    - "src/payment/**"
    - "src/billing/**"
    - "migrations/**"
    - ".github/workflows/**"
    - "*.env*"
    - "src/webhook/**"
  medium:
    - "src/api/**"
    - "src/server/**"
    - "infrastructure/**"
    - "Dockerfile"
    - "docker-compose*.yml"
  low:
    - "docs/**"
    - "*.md"
    - ".cursor/**"

# Glob patterns to exclude from risk scoring entirely
ignore:
  - "*.md"
  - ".cursor/**"
  - ".vscode/**"
  - "agent-transcripts/**"

# Freeze windows — block deploys during off-hours
freeze:
  - days: ["friday"]
    afterHour: 16
    timezone: "America/Los_Angeles"
    message: "Late Friday deployments are blocked — reduced weekend incident response"
  - days: ["saturday", "sunday"]
    timezone: "America/Los_Angeles"
    message: "Weekend deployments are blocked — reduced team availability"

# Per-environment thresholds
environments:
  production:
    risk: 65
    warn: 50
    require_security_clear: true
  staging:
    risk: 80
    warn: 65
  preview:
    risk: 90
    warn: 80

# Security gate settings
security:
  severity_threshold: warning
  block_on_critical: true
  ignore_rules: []

# Canary / deploy outcome tracking
canary:
  webhook_type: vercel
  rollback_on_failure: true
