# DeployGuard gate for Komatik-managed repositories
#
# Designed for the Komatik autonomous agent workforce. This workflow:
# - Recognises agent branches (agent/*, claude/*, cursor/*-<hex>)
# - Applies stricter thresholds for agent-created PRs
# - Adds risk labels for HQ visibility
# - Auto-requests human review on high-risk agent changes
# - Reports to evaluation store for Komatik HQ dashboards
#
# Prerequisites:
# - GitHub secrets: DEPLOYGUARD_API_KEY (optional), EVALUATION_STORE_URL (optional)
# - .deployguard.yml in the repo root (generated by `npx deployguard init`)
#
# Copy to .github/workflows/

name: DeployGuard (Komatik)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  merge_group:

permissions:
  contents: read
  pull-requests: write
  checks: write
  security-events: read

concurrency:
  group: deployguard-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      decision: ${{ steps.dg.outputs.gate-decision }}
      risk-score: ${{ steps.dg.outputs.risk-score }}
    steps:
      - name: Detect agent branch
        id: branch
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          IS_AGENT=false

          if [[ "$BRANCH" =~ ^agent/ ]]; then
            IS_AGENT=true
            AGENT_NAME=$(echo "$BRANCH" | cut -d'/' -f2)
          elif [[ "$BRANCH" =~ ^claude/ ]]; then
            IS_AGENT=true
            AGENT_NAME="claude"
          elif [[ "$BRANCH" =~ ^cursor/.*-[0-9a-f]+$ ]]; then
            IS_AGENT=true
            AGENT_NAME="cursor"
          fi

          echo "is_agent=$IS_AGENT" >> "$GITHUB_OUTPUT"
          echo "agent_name=${AGENT_NAME:-human}" >> "$GITHUB_OUTPUT"
          echo "Branch: $BRANCH | Agent: $IS_AGENT ($AGENT_NAME)"

      - name: DeployGuard evaluation
        id: dg
        uses: dschirmer-shiftkey/deployguard@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          api-key: ${{ secrets.DEPLOYGUARD_API_KEY }}
          risk-threshold: ${{ steps.branch.outputs.is_agent == 'true' && '60' || '70' }}
          warn-threshold: ${{ steps.branch.outputs.is_agent == 'true' && '45' || '55' }}
          fail-mode: open
          self-heal: "true"
          add-risk-labels: "true"
          security-gate: "true"
          dora-metrics: "true"
          reviewers-on-risk: ${{ vars.DEPLOYGUARD_REVIEWERS || '' }}
          evaluation-store-url: ${{ secrets.EVALUATION_STORE_URL }}

      - name: Require human review for high-risk agent PRs
        if: >
          steps.branch.outputs.is_agent == 'true' &&
          (steps.dg.outputs.gate-decision == 'warn' || steps.dg.outputs.gate-decision == 'block')
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;

            const reviewers = '${{ vars.DEPLOYGUARD_REVIEWERS || '' }}'
              .split(',')
              .map(r => r.trim())
              .filter(Boolean);

            if (reviewers.length === 0) {
              core.warning('No DEPLOYGUARD_REVIEWERS configured — cannot auto-request review');
              return;
            }

            const author = pr.user?.login;
            const filtered = reviewers.filter(r => r !== author);
            if (filtered.length === 0) return;

            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              reviewers: filtered,
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: [
                `### 🤖 Komatik Agent PR — Review Required`,
                ``,
                `This PR was created by agent **${{ steps.branch.outputs.agent_name }}** ` +
                `and received a **${{ steps.dg.outputs.gate-decision }}** decision ` +
                `(risk score: ${{ steps.dg.outputs.risk-score }}/100).`,
                ``,
                `Human review has been automatically requested per Komatik HQ policy.`,
              ].join('\n'),
            });
